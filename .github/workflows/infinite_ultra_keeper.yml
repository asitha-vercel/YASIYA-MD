name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *"
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: false 

jobs:
  high-speed-relay:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 1. Infrastructure Sync
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Node.js Setup (Fixed Cache)
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          # මෙතැන cache: 'npm' ඉවත් කළා ඔයාගේ lock file එක නැති ප්‍රශ්නය නිසා

      - name: 🧹 3. Clean & Stabilize Clusters
        run: |
          # අනවශ්‍ය folders 20ම මකා දමයි
          find . -maxdepth 1 -type d -not -path '*/.*' -not -name '.github' -not -name '.' -exec rm -rf {} +
          mkdir -p runtime_core net_bridge
          echo "STABILITY_LOCK: ACTIVE" > runtime_core/status.log

      - name: ⬆️ 4. Quantum-Speed Sync (Vercel Trigger)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add .
          git commit -m "⚡ PLATFORM-RELAY [$(date +'%I:%M %p')]" || exit 0
          git push --force origin main

      - name: 🔄 5. 6-Hour Lifetime Loop (Auto-Restart)
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          # පැය 5යි විනාඩි 45 පිරුණු පසු
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            gh workflow run infinite_ultra_keeper.yml --ref main
          else
            gh workflow run infinite_ultra_keeper.yml --ref main
          fi

      - name: 🌐 6. GitHub Runner (Live Bot Hosting Mode)
        run: |
          # Vercel restart වන අතරතුර බොට් එක මෙතැනින් පණගන්වයි
          echo "Installing dependencies for GitHub Hosting..."
          npm install --quiet
          
          echo "Starting WhatsApp Bot on GitHub Runner..."
          # Vercel අලුත් වනතුරු විනාඩි 10ක් බොට්ව GitHub එකෙන් පණගන්වයි
          # පසුබිමින් බොට් දුවන අතරතුර Ping එක පවත්වා ගනී
          npm start & 
          
          URL="https://yasiya-8pegmyplo-asitha-vercels-projects.vercel.app/"
          for i in {1..60}; do
            curl -I -s $URL > /dev/null
            echo "Relay-Pulse $i: Bot is LIVE on GitHub & Syncing with Vercel..."
            sleep 10
          done
          echo "Handoff complete."

      - name: 🧹 7. Auto-Delete Old Runs
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # ලොග්ස් පිරිසිදු කරයි
          gh run list --workflow infinite_ultra_keeper.yml --limit 30 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
