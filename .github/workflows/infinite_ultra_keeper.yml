name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *"
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: false # Platform මාරු වන විට Connection එක කැඩීම වළක්වයි

jobs:
  high-speed-relay:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x] # ඔයා ඉල්ලපු Node.js version එක

    steps:
      - name: 🚀 1. Infrastructure Sync
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Node.js Environment Setup
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 🧹 3. Clean & Stabilize Clusters
        run: |
          # අනවශ්‍ය folders ඉවත් කර වේගය වැඩි කරයි
          find . -maxdepth 1 -type d -not -path '*/.*' -not -name '.github' -not -name '.' -exec rm -rf {} +
          mkdir -p runtime_core net_bridge
          echo "STABILITY_LOCK: ACTIVE" > runtime_core/status.log

      - name: ⬆️ 4. Quantum-Speed Sync (Vercel Trigger)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add .
          git commit -m "⚡ PLATFORM-RELAY [$(date +'%I:%M %p')]" || exit 0
          git push --force origin main

      - name: 🔄 5. Lifetime Loop Control
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          # පැය 6 සීමාව පරාජය කරමින් අලුත් Workflow එකක් පණගන්වයි
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            gh workflow run infinite_ultra_keeper.yml --ref main
          else
            gh workflow run infinite_ultra_keeper.yml --ref main
          fi

      - name: 🌐 6. GitHub Runner (10-Minute Virtual Hosting)
        run: |
          # Vercel එක Restart වීමට පෙර (විනාඩි 40දී) GitHub එකෙන් බොට් එක පණගන්වයි
          # මෙය විනාඩි 10ක් පුරා Pulse එක තබා ගනිමින් WhatsApp Reconnect වීම වළක්වයි
          URL="https://yasiya-8pegmyplo-asitha-vercels-projects.vercel.app/"
          echo "Starting GitHub Relay Host (Node 20.x)..."
          
          # තත්පර 10න් 10ට විනාඩි 10ක් පුරා Session එක අල්ලා ගනී (Pulse 60)
          for i in {1..60}; do
            curl -I -s $URL > /dev/null
            echo "Relay-Pulse $i: GitHub holding session for Vercel Restart..."
            sleep 10
          done
          echo "Handoff complete. Bot successfully stabilized."

      - name: 🧹 7. Auto-Delete Old Workflow Runs
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # Workflow එක පිරෙන්න නොදී පරණ ඒවා මකා දමයි
          gh run list --workflow infinite_ultra_keeper.yml --limit 30 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
