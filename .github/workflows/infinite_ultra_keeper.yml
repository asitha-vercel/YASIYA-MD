name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *" # Backup trigger
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: true

jobs:
  ultra-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. Advanced Infrastructure Initialization
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Dynamic Cluster Update (20 Folders)
        run: |
          mkdir -p system_core cluster_alpha v_restart_logs g_session_logs network_traffic security_vault \
                   db_cache logic_control analytics_hub monitor_io build_log ui_assets \
                   gateway_api cloud_sync backup_node error_stream telemetry_data optimization_engine \
                   heartbeat_sync registry_global process_control
          
          TIMESTAMP=$(date +'%Y-%m-%d %I:%M:%S %p')
          for folder in */; do
            echo "STATUS: ONLINE | SYNC: $TIMESTAMP" > "${folder}activity.log"
          done

      - name: ⬆️ 3. Quantum Push (Visual Status)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add .
          git commit -m "💎 ULTRA-SYNC [$(date +'%I:%M %p')] - Clusters Active" || exit 0
          git push --force origin main

      - name: 🔄 4. Exact 44-Minute Re-Trigger Logic
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          
          # GitHub Uptime එක පැය 5 විනාඩි 45 (20700s) පිරුනම අලුත්ම session එකක් පටන් ගනී
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            echo "Session limit reached. Resetting Lifecycle..."
            gh workflow run infinite_ultra_keeper.yml --ref main
          else
            echo "Triggering next cycle in exactly 44 minutes..."
            # මෙතනින් තමයි පමාව නැති කරන්නේ. 
            # එකක් ඉවර වුණු ගමන් ඊළඟ එක schedule කරනවා.
            gh workflow run infinite_ultra_keeper.yml --ref main
          fi

      - name: 🧹 5. History Purge Sequence
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # Cleanup old runs to keep actions tab clean
          gh run list --workflow infinite_ultra_keeper.yml --limit 30 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true

      - name: 🌐 6. Vercel Wake-up Pulse
        run: |
          curl -I -s https://yasiya-yzayeozy5-asitha-vercels-projects.vercel.app/
