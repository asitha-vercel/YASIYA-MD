name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *" # GitHub එකේ backup එකක් විදියට විනාඩි 44න් 44ට
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: true

jobs:
  loop-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. Fast Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Direct Update (Force Status)
        run: |
          mkdir -p vercel_status github_status
          # ඔයාට time එක බලාගන්න පුළුවන් වෙන්න මෙතන වෙලාව update කරනවා
          echo "Vercel-Auto-Restart: $(date)" > vercel_status/last_restart.txt
          echo "GitHub-Persistence: $(date)" > github_status/restart_log.txt

      - name: ⬆️ 3. Push Updates (Triggers Vercel)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add .
          # Vercel එක තත්පර 10කින් අවදි වෙන්න මෙතන Commit එකක් යනවා
          git commit -m "⚡ Sync: $(date +'%H:%M') [Life-Time]" || exit 0
          git push --force origin main

      - name: 🔄 4. Precise GitHub Restart (5h 45m)
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          # පැය 5 විනාඩි 45 (තත්පර 20700) සම්පූර්ණ වුණාම අලුත්ම loop එකක් පටන් ගන්නවා
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            echo "GitHub 5:45 Limit Reached. Starting Fresh Cycle..."
            gh workflow run infinite_ultra_keeper.yml --ref main
          else
            echo "GitHub machine is stable. Waiting for next cron..."
          fi

      - name: 🧹 5. Auto Cleanup History
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # පරණ දුවපු workflow runs ලිස්ට් එක පිරෙන්නේ නැති වෙන්න මකා දමනවා
          gh run list --workflow infinite_ultra_keeper.yml --limit 20 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true

      - name: 🌐 6. Hyper Ping
        run: |
          curl -I -s https://yasiya-yzayeozy5-asitha-vercels-projects.vercel.app/
          echo "Vercel Wake-up Sent at $(date)"
