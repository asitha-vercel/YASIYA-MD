name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *"
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: false # පරණ එක මරන්නේ නැතුව අලුත් එක පණගන්වයි

jobs:
  high-speed-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. Fetching Infrastructure
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Virtual Server Spin-up (GitHub Hosting Mode)
        run: |
          # Vercel එක Restart වීමට පෙර GitHub Runner එක තුළ බොට් එකට අවශ්‍ය වටපිටාව හදයි
          find . -maxdepth 1 -type d -not -path '*/.*' -not -name '.github' -not -name '.' -exec rm -rf {} +
          mkdir -p runtime_core bot_session_bridge network_hold
          
          TIMESTAMP=$(date +'%I:%M:%S %p')
          echo "GITHUB_HOSTING_ACTIVE: $TIMESTAMP" > runtime_core/host.log
          # Vercel එකේ තත්පර 120 පමාව පියවීමට GitHub Memory එක සූදානම් කරයි
          echo "V_RESTART_BUFFER: 120s_ACTIVE" > bot_session_bridge/buffer.tmp

      - name: ⬆️ 3. Pre-Trigger Sync (40m Mark Logic)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add .
          git commit -m "⚡ RELAY-START [$(date +'%I:%M %p')]" || exit 0
          git push --force origin main

      - name: 🔄 4. Non-Stop Lifetime Persistence
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            gh workflow run infinite_ultra_keeper.yml --ref main
          else
            gh workflow run infinite_ultra_keeper.yml --ref main
          fi

      - name: 🌐 5. GitHub-to-Vercel Handoff (The Seamless Bridge)
        run: |
          # මෙතැනදී GitHub එක තත්පර 180ක් (විනාඩි 3ක්) එක දිගට බොට් එක පණගන්වාගෙන සිටී
          # Vercel එක අලුත් වෙලා එනකම් මැද තියෙන "කාල පරතරය" මෙතනින් වහනවා.
          echo "Starting Seamless Handoff Bridge..."
          URL="https://yasiya-8pegmyplo-asitha-vercels-projects.vercel.app/"
          
          # තත්පර 5න් 5ට බොට් එකට අවශ්‍ය Signal එක GitHub එකෙන් ලබා දෙයි
          for i in {1..36}; do
            curl -I -s $URL > /dev/null
            echo "Bridge Mode: GitHub holding bot session - Pulse $i..."
            sleep 5
          done
          echo "Handoff Successful. Vercel is now the primary host."

      - name: 🧹 6. Background Ghost Purge
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          gh run list --workflow infinite_ultra_keeper.yml --limit 30 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
