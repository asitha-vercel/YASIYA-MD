name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *"
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: true

jobs:
  loop-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. Fast Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Direct Update (Force Vercel Restart)
        run: |
          mkdir -p vercel_status github_status
          echo "Sync: $(date +%s)" > vercel_status/last_restart.txt
          echo "Last GitHub Sync: $(date)" > github_status/restart_log.txt

      - name: ⬆️ 3. Push to Repository (Triggers Vercel)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add vercel_status/last_restart.txt github_status/restart_log.txt
          git commit -m "⚡ Vercel-Cycle: $(date +'%H:%M')" || echo "No changes"
          git push

      - name: 🔄 4. GitHub 5-Hour Infinite Loop
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          if [ "$UPTIME_SEC" -gt 18000 ]; then
            echo "GitHub 5-Hour reached. Restarting Workflow..."
            gh workflow run infinite_ultra_keeper.yml
          else
            echo "GitHub session stable."
          fi

      - name: 🧹 5. Cleanup Old Runs (Auto Delete)
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # දැනට අවසන් වී ඇති (Success/Cancelled/Failed) පරණ workflow runs ඔක්කොම delete කරයි
          # එවිට ලැයිස්තුව පිරෙන්නේ නැත.
          echo "Cleaning up old workflow runs..."
          gh run list --workflow infinite_ultra_keeper.yml --limit 100 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {}
          echo "Cleanup completed!"

      - name: 🌐 6. Hyper Ping
        run: |
          curl -I -s https://yasiya-yzayeozy5-asitha-vercels-projects.vercel.app/
          echo "Vercel Wake-up Call Sent!"
