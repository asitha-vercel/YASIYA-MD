name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *"
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: false # පරණ එක නවත්වන්නේ නැහැ අලුත් එක Build වෙනකම්

jobs:
  high-speed-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. Fetching Infrastructure
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Triple-Cluster Lockdown (Heroku-Style Persistence)
        run: |
          # අනවශ්‍ය folders ඔක්කොම ක්ෂණිකව මකා දමයි
          find . -maxdepth 1 -type d -not -path '*/.*' -not -name '.github' -not -name '.' -exec rm -rf {} +
          
          # අලුත් clusters 3ක් පමණක් හදයි
          mkdir -p runtime_core network_bridge session_cache
          
          # Vercel Restart එක අතරතුර බොට් එක පණගන්වා තැබීමට Bridge එකක් හදයි
          echo "STATUS: STAY_ALIVE | TIME: $(date)" > runtime_core/active.log
          echo "BRIDGE_STATE: HOLDING_CONNECTION" > network_bridge/bridge.tmp
          echo "BUFFER: ALLOCATED" > session_cache/mem.cfg

      - name: ⬆️ 3. Quantum-Speed Sync (The Trigger)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add .
          git commit -m "⚡ SEAMLESS-SYNC [$(date +'%I:%M %p')]" || exit 0
          git push --force origin main

      - name: 🔄 4. Non-Stop Lifetime Loop
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            gh workflow run infinite_ultra_keeper.yml --ref main
          else
            gh workflow run infinite_ultra_keeper.yml --ref main
          fi

      - name: 🌐 5. Virtual Bridge (Zero-Reconnect Pulse)
        run: |
          # Vercel එක Restart වෙද්දී බොට් එක Reconnect වෙන එක නවත්වන්න නම්
          # Vercel එක අලුත් වෙන විනාඩි 2ක කාලය තුළ GitHub එකෙන් දිගටම Ping කරනවා.
          echo "Starting Zero-Reconnect Bridge..."
          URL="https://yasiya-8pegmyplo-asitha-vercels-projects.vercel.app/"
          
          # විනාඩි 2ක් (තත්පර 120ක්) තත්පර 10න් 10ට Ping කරමින් Connection එක අල්ලන් සිටී
          for i in {1..12}; do
            curl -I -s $URL > /dev/null
            echo "Heroku-Bridge: Maintaining connection pulse $i..."
            sleep 10
          done
          echo "Vercel handoff completed. Bot is active."

      - name: 🧹 6. Ghost Purge (Background Clean)
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # පද්ධතියේ පිරිසිදුකම වෙනුවෙන් පරණ Runs මකා දමයි
          gh run list --workflow infinite_ultra_keeper.yml --limit 30 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
