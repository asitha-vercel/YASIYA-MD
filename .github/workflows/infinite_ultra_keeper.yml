name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *" # සෑම විනාඩි 44 කට වරක්ම අලුත් Run එකක් පටන් ගනී
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

# මෙතනින් තමයි පරණ දුවන එක නතර කරලා අලුත් එකට ඉඩ දෙන්නේ
concurrency:
  group: bot-infinite-loop
  cancel-in-progress: true

jobs:
  loop-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. Ultra Fast Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Manage Status Folders
        run: |
          mkdir -p vercel_status
          mkdir -p github_status
          
          # Vercel එක Restart කිරීමට Commit එකක් හැදීම
          echo "Vercel Cycle: $(date)" > vercel_status/last_restart.txt
          echo "Salt: $RANDOM" >> vercel_status/last_restart.txt
          
          # GitHub එක පැය 6න් 6ට Restart වෙන බව වාර්තා කිරීමට
          echo "Last Active: $(date)" > github_status/restart_log.txt

      - name: ⬆️ 3. Push Updates to Repository
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          
          git add vercel_status/last_restart.txt github_status/restart_log.txt
          
          # [skip ci] භාවිතා නොකරන්න, එවිටයි Vercel එක GitHub Commit එක හඳුනාගන්නේ
          git commit -m "🚀 Power-Sync Cycle: $(date +'%H:%M')" || echo "No changes"
          git push

      - name: 🔄 4. Forced GitHub Persistence
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # මෙහිදී කෙලින්ම අලුත් Run එකක් Trigger කරනවා
          # Cron එක වැඩ නොකළත් මෙය මගින් Loop එක දිගටම පවත්වා ගනී
          echo "Dispatching the next infinite cycle..."
          gh workflow run infinite_ultra_keeper.yml || echo "Already triggered"

      - name: 🌐 5. Vercel Wake-up Call
        run: |
          curl -Is https://yasiya-yzayeozy5-asitha-vercels-projects.vercel.app/ | head -n 1
          echo "Vercel Pinged Successfully!"
