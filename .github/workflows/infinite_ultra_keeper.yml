name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *" # විනාඩි 44න් 44ට Vercel Restart එකට
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: true

jobs:
  loop-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. Strategic Infrastructure Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📁 2. Advanced Multi-Folder Initialization
        run: |
          # Folders 6ක් සාදා ඒවායේ ලස්සනට පෙනෙන්නට දත්ත ඇතුළත් කරයි
          mkdir -p system_core v_restart_logs g_session_logs network_ping security_sync database_cache
          
          # System Core Update
          echo "Build-ID: $(date +%s%N)" > system_core/build.info
          
          # Vercel Logic (විනාඩි 44න් 44ට)
          echo "Last-Vercel-Refresh: $(date +'%Y-%m-%d %H:%M:%S')" > v_restart_logs/active_state.log
          
          # GitHub Logic
          echo "Current-Session-Uptime: $(awk '{print $1}' /proc/uptime)" > g_session_logs/uptime.stats
          
          # Network & Security Files
          echo "Status: High-Speed-Active" > network_ping/latency.txt
          echo "Auth: Valid-Ultra-Bot" > security_sync/token_state.txt
          echo "Cache-Clear: $(date)" > database_cache/buffer.tmp

      - name: ⬆️ 3. High-Frequency Data Sync (Triggers Vercel)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add .
          # මෙතැනදී Commit එක සිදුවන නිසා Vercel එක අනිවාර්යයෙන්ම Restart වේ
          git commit -m "💎 SUPREME-SYNC [$(date +'%H:%M')] - System Optimized" || exit 0
          git push --force origin main

      - name: 🔄 4. 5-Hour Persistent Loop Architecture
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # පැය 5 විනාඩි 45 (තත්පර 20700) සීමාව පරීක්ෂා කිරීම
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          echo "Current Machine Uptime: $UPTIME_SEC seconds"
          
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            echo "Critical Threshold Reached! Triggering Fresh Lifetime Cycle..."
            gh workflow run infinite_ultra_keeper.yml --ref main
          else
            echo "System Stability: Optimal. Continuing current execution cycle."
          fi

      - name: 🧹 5. Automated History Purge (Success/Clean)
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # පරණ Runs මකමින් Dashboard එක පිරිසිදුව තබා ගැනීම
          echo "Initiating history cleanup sequence..."
          gh run list --workflow infinite_ultra_keeper.yml --limit 40 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
          echo "Cleanup Sequence Completed."

      - name: 🌐 6. Global Node Pulse (Hyper-Wake)
        run: |
          # Vercel App එක අවදි කර තැබීමට (Ping)
          RESPONSE=$(curl -I -s https://yasiya-yzayeozy5-asitha-vercels-projects.vercel.app/ | head -n 1)
          echo "Server Response: $RESPONSE"
          echo "Pulse Completed at $(date)"
