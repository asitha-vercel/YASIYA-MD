name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *"
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: true # අලුත් එක ආ සැණින් පරණ එක නතර කර වේගය වැඩි කරයි

jobs:
  loop-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. Turbo Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # මුළු history එකම ගන්නේ නැති නිසා තත්පරයකින් checkout වේ

      - name: 🛠️ 2. Instant Status Update
        run: |
          mkdir -p vercel_status github_status
          # ඉතා කෙටි තොරතුරක් පමණක් ලිවීමෙන් වේගය වැඩි කරයි
          echo "$(date +%s)" > vercel_status/last_restart.txt
          echo "Active" > github_status/restart_log.txt

      - name: ⬆️ 3. Quick Push (Vercel Trigger)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add .
          # Vercel එක වහාම හඳුනා ගැනීමට කෙටි Commit Message එකක්
          git commit -m "⚡ Turbo: $(date +'%M')" || exit 0
          git push --force # වේගවත් Push කිරීමක් සඳහා

      - name: 🔄 4. Instant Loop Trigger
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # පැය 6 සීමාව ඉවත් කරමින් අලුත්ම Cycle එකක් Dispatch කිරීම
          gh workflow run infinite_ultra_keeper.yml --ref main

      - name: 🌐 5. Hyper Ping (Wake Up)
        run: |
          # Vercel එක තත්පරයෙන් අවදි කිරීමට (Header පමණක් ලබා ගනී)
          curl -I -s https://yasiya-yzayeozy5-asitha-vercels-projects.vercel.app/
          echo "Bot Pulsed!"
