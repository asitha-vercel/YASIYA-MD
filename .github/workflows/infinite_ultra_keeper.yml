name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *"
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: false # පරණ එක නවත්වන්නේ නැහැ අලුත් එක Build වන තෙක්

jobs:
  ultra-relay-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. System Infrastructure Sync
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Triple-Cluster Lockdown & Cleanup
        run: |
          # අනවශ්‍ය සියලුම folders ඉවත් කර Folders 3කට සීමා කරයි
          find . -maxdepth 1 -type d -not -path '*/.*' -not -name '.github' -not -name '.' -exec rm -rf {} +
          mkdir -p github_host_core session_bridge network_hold
          
          TIMESTAMP=$(date +'%I:%M:%S %p')
          echo "HOST_ACTIVE: $TIMESTAMP" > github_host_core/host.log
          echo "HANDOVER_STATUS: READY" > session_bridge/status.tmp

      - name: ⬆️ 3. Pre-Trigger Sync (Vercel Build Start)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add .
          git commit -m "⚡ RELAY-SYNC [$(date +'%I:%M %p')]" || exit 0
          git push --force origin main

      - name: 🔄 4. Non-Stop Lifetime Persistence
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          # GitHub පැය 6 සීමාව පරාජය කරමින් අලුත්ම Workflow එකක් පණගන්වයි
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            gh workflow run infinite_ultra_keeper.yml --ref main
          else
            gh workflow run infinite_ultra_keeper.yml --ref main
          fi

      - name: 🌐 5. GitHub-Powered Bot Hosting (The 40m Relay)
        run: |
          # Vercel එක Restart වීමට පෙර සහ අතරතුර GitHub Runner එකෙන් බොට් එක පණගන්වයි
          # මෙතැනදී තත්පර 180ක් (විනාඩි 3ක්) එක දිගට Pulse එක තබා ගනී
          URL="https://yasiya-8pegmyplo-asitha-vercels-projects.vercel.app/"
          
          echo "Relay active: GitHub is now holding the bot connection..."
          for i in {1..36}; do
            curl -I -s $URL > /dev/null
            echo "Relay-Pulse $i: Holding WhatsApp session alive via GitHub..."
            sleep 5
          done
          echo "Handoff complete. Vercel has taken over the session."

      - name: 🧹 6. Ghost Purge Sequence
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # Actions tab එක පිරිසිදුව තබා ගැනීමට පරණ runs සියල්ල මකා දමයි
          gh run list --workflow infinite_ultra_keeper.yml --limit 30 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
