name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *" # විනාඩි 44න් 44ට Trigger වේ
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-infinite-loop
  cancel-in-progress: false 

jobs:
  precise-relay-engine:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 1. Infrastructure Sync
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Node.js Initialization (20.x)
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: 🧹 3. Ghost Cleanup & Sync
        run: |
          # අනවශ්‍ය folders ඉවත් කරයි
          find . -maxdepth 1 -type d -not -path '*/.*' -not -name '.github' -not -name '.' -exec rm -rf {} +
          mkdir -p runtime_core
          echo "STANDBY_MODE" > runtime_core/status.log

      - name: ⬆️ 4. Quantum Sync (Vercel Trigger)
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add .
          git commit -m "⚡ RELAY-INITIALIZED [$(date +'%I:%M %p')]" || exit 0
          git push --force origin main

      - name: 🔄 5. 6-Hour Persistence Logic
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          # GitHub පැය 6 සීමාව පරාජය කරයි
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            gh workflow run infinite_ultra_keeper.yml --ref main
          else
            gh workflow run infinite_ultra_keeper.yml --ref main
          fi

      - name: 🌐 6. Precise 40-Minute Standby & 10-Minute Hosting
        run: |
          # Vercel එක විනාඩි 44ක් දුවන නිසා, මුල් විනාඩි 40 GitHub එක නිහඬව සිටී
          echo "Entering Standby Mode: GitHub will wait 40 minutes before taking over..."
          sleep 2400 # හරියටම විනාඩි 40ක් (40 * 60 තත්පර)
          
          echo "Vercel restart approaching! Starting GitHub Hosting Mode..."
          npm install --quiet
          
          # GitHub Runner එක හරහා බොට් එක පණගන්වයි
          npm start & 
          
          URL="https://yasiya-8pegmyplo-asitha-vercels-projects.vercel.app/"
          # ඊළඟ විනාඩි 10 පුරා (තත්පර 600) Vercel එක restart වන තෙක් GitHub එක වැඩේ අල්ලන් සිටී
          for i in {1..60}; do
            curl -I -s $URL > /dev/null
            echo "Relay-Pulse $i: Bot is LIVE on GitHub while Vercel Restarts..."
            sleep 10
          done
          echo "Vercel should be back now. Handoff complete."

      - name: 🧹 7. Auto-Delete Old Workflow Runs
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # ලොග්ස් පිරිසිදු කරයි
          gh run list --workflow infinite_ultra_keeper.yml --limit 30 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
